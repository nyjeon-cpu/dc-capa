*{box-sizing:border-box;margin:0;padding:0}

.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{background:#334155;border:1px solid #475569;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.85rem}

const pct=(totalPlt/RT_CAPA*100).toFixed(1);

const cls=pct>100?'over':pct>80?'warn':'ok';

const teamSel=document.getElementById('fTeam');

[...new Set(allRows.map(r=>r[3]))].sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;mdSel.appendChild(o);});

let sc=6,sd=-1;
function sort(col){sc===col?sd*=-1:(sc=col,sd=-1);render();}
function render(){
  const ftm=teamSel.value,fm=mdSel.value,fs=document.getElementById('fSearch').value.toLowerCase();
  let d=allRows.filter(r=>{
    if(ftm&&r[4]!==ftm)return false;
    if(fm&&r[3]!==fm)return false;
    if(fs&&!r[1].toLowerCase().includes(fs)&&!r[2].toLowerCase().includes(fs))return false;
    return true;
  });
  d.sort((a,b)=>{const av=a[sc],bv=b[sc];return typeof av==='number'?(av-bv)*sd:String(av).localeCompare(String(bv))*sd;});
  document.getElementById('tbody').innerHTML=d.map((r,i)=>`<tr><td>${i+1}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5].toLocaleString()}</td><td>${Math.round(r[6])}</td><td>${getSHD(r[1],r[5])}</td></tr>`).join('');
}
teamSel.onchange=render;mdSel.onchange=render;document.getElementById('fSearch').oninput=render;render();
</script>
