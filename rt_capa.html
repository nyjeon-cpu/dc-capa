*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:24px 32px;border-bottom:1px solid #334155}

.container{padding:24px 32px}
.top-grid{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:16px;margin-bottom:24px}
.card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155}

.usage-bar{height:8px;background:#334155;border-radius:4px;margin-top:12px;overflow:hidden}
.usage-fill{height:100%;border-radius:4px}
.donut-wrap{display:flex;justify-content:center;margin-top:16px;height:180px;position:relative}
.donut-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-label .pct{font-size:1.6rem;font-weight:700;color:#34d399}
.donut-label .pct-sub{font-size:.75rem;color:#94a3b8}
.split-card{display:flex;flex-direction:column;gap:10px}

.split-row .label{font-size:.85rem;color:#94a3b8}
.split-row .val{font-size:1rem;font-weight:600;color:#f1f5f9}
.split-row .badge2{font-size:.75rem;padding:2px 8px;border-radius:10px;background:rgba(52,211,153,.15);color:#34d399}
.chart-section{background:#1e293b;border-radius:12px;padding:24px;margin-bottom:24px;border:1px solid #334155}
.chart-section h2{font-size:1.05rem;font-weight:600;color:#f1f5f9;margin-bottom:16px}
.table-section{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}
.table-section h2{font-size:1.05rem;font-weight:600;color:#f1f5f9;margin-bottom:16px}
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{background:#334155;border:1px solid #475569;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.85rem}
.filters input{width:220px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#0f172a;color:#94a3b8;font-weight:600;padding:10px 12px;text-align:left;position:sticky;top:0;cursor:pointer}
th:hover{color:#e2e8f0}
td{padding:9px 12px;border-bottom:1px solid #1e293b}
tr:hover td{background:#334155}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.b-rack{background:rgba(52,211,153,.15);color:#34d399}
.b-flat{background:rgba(251,191,36,.15);color:#fbbf24}
.tbl-wrap{max-height:540px;overflow-y:auto}
.over{color:#ef4444}.warn{color:#f59e0b}.ok{color:#22c55e}

const rowMap = {};
[...rackRows,...flatRows].forEach(r => {
  const key = r[1];
  if (rowMap[key]) {
    rowMap[key][5] += r[5]; // qty 합산
    rowMap[key][6] += r[6]; // plt 합산
  } else {
    rowMap[key] = [...r];
  }
});
const allRows = Object.values(rowMap);
const rackTeam={"가공식품MD팀": 799.1, "라이프스타일MD팀": 517.7, "제과유음료MD팀": 1537.8, "PB상품개발팀": 213.2, "수축산MD팀": 39.6, "농산MD팀": 12.2};
const flatTeam={"농산MD팀": 27, "PB상품개발팀": 210, "기타": 101, "가공식품MD팀": 281, "제과유음료MD팀": 219, "라이프스타일MD팀": 165};
const allTeams=["제과유음료MD팀","가공식품MD팀","라이프스타일MD팀","수축산MD팀","HMR상품개발팀","농산MD팀","PB상품개발팀"];
const teamColors={"제과유음료MD팀":"#378ADD","가공식품MD팀":"#1D9E75","라이프스타일MD팀":"#D4537E","수축산MD팀":"#D85A30","HMR상품개발팀":"#7F77DD","농산MD팀":"#639922","PB상품개발팀":"#BA7517"};

const pct=(totalPlt/RT_CAPA*100).toFixed(1);
document.getElementById('donutPct').textContent=pct+'%';
document.getElementById('totalPlt').textContent=totalPlt.toLocaleString()+' PLT';
const cls=pct>100?'over':pct>80?'warn':'ok';
document.getElementById('totalSub').innerHTML=`<span class="${cls}">${pct}% 사용</span> · CAPA ${RT_CAPA.toLocaleString()} PLT<br><span style="color:#64748b;font-size:.75rem">인천기지 4,310 + 위수탁 950</span>`;
document.getElementById('usageFill').style.width=Math.min(100,pct)+'%';
const remaining=Math.max(0,RT_CAPA-totalPlt);
document.getElementById('remainingPlt').innerHTML=`잔여 보관 가능: <span style="color:#34d399;font-weight:700">${remaining.toLocaleString()} PLT</span>`;
document.getElementById('rackPlt').textContent=rackPlt.toLocaleString()+' PLT';
document.getElementById('rackPct').textContent=(rackPlt/3964*100).toFixed(1)+'%';
document.getElementById('flatPlt').textContent=flatPlt.toLocaleString()+' PLT';
document.getElementById('flatPct').textContent=(flatPlt/1296*100).toFixed(1)+'%';
document.getElementById('totalSku').textContent=totalSku.toLocaleString()+' SKU';

new Chart(document.getElementById('mainDonut'),{type:'doughnut',data:{datasets:[{data:[totalPlt,Math.max(0,RT_CAPA-totalPlt)],backgroundColor:['#34d399','#334155'],borderWidth:0,hoverOffset:4}]},options:{cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataIndex===0?`사용: ${totalPlt.toLocaleString()} PLT`:`여유: ${Math.max(0,RT_CAPA-totalPlt).toLocaleString()} PLT`}}}}});

const combined={};
allTeams.forEach(t=>{combined[t]=(rackTeam[t]||0)+(flatTeam[t]||0);});
new Chart(document.getElementById('teamBar'),{type:'bar',data:{labels:allTeams,datasets:[{label:'파렛트랙',data:allTeams.map(t=>rackTeam[t]||0),backgroundColor:allTeams.map(t=>teamColors[t]),borderWidth:0},{label:'평치',data:allTeams.map(t=>flatTeam[t]||0),backgroundColor:allTeams.map(t=>teamColors[t]+'88'),borderWidth:0,borderRadius:2}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{position:'top',labels:{color:'#e2e8f0',boxWidth:12,padding:10,font:{size:11}}}},scales:{x:{stacked:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}},y:{stacked:true,ticks:{color:'#e2e8f0',font:{size:11}},grid:{color:'#334155'}}}}});

const teamSel=document.getElementById('fTeam');
const mdSel=document.getElementById('fMd');
[...new Set(allRows.map(r=>r[4]))].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;teamSel.appendChild(o);});
[...new Set(allRows.map(r=>r[3]))].sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;mdSel.appendChild(o);});

let sc=6,sd=-1;
function sort(col){sc===col?sd*=-1:(sc=col,sd=-1);render();}
function render(){
  const ftm=teamSel.value,fm=mdSel.value,fs=document.getElementById('fSearch').value.toLowerCase();
  let d=allRows.filter(r=>{
    if(ftm&&r[4]!==ftm)return false;
    if(fm&&r[3]!==fm)return false;
    if(fs&&!r[1].toLowerCase().includes(fs)&&!r[2].toLowerCase().includes(fs))return false;
    return true;
  });
  d.sort((a,b)=>{const av=a[sc],bv=b[sc];return typeof av==='number'?(av-bv)*sd:String(av).localeCompare(String(bv))*sd;});
  document.getElementById('tbody').innerHTML=d.map((r,i)=>`<tr><td>${i+1}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5].toLocaleString()}</td><td>${Math.round(r[6])}</td><td>${getSHD(r[1],r[5])}</td></tr>`).join('');
}
teamSel.onchange=render;mdSel.onchange=render;document.getElementById('fSearch').oninput=render;render();
</script>
