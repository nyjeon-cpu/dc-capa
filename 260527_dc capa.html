* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6f8; color: #1a1a2e; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

.zone-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 20px; }
.zone-card { background: #fff; border-radius: 10px; border: 1px solid #e8e8f0; overflow: hidden; }

.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.zone-title { font-size: 13px; font-weight: 600; }
.zone-chart-area { height: 130px; position: relative; padding: 0 8px; }
.zone-stats { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #f0f0f4; }
.stat { padding: 8px 12px; }
.stat:first-child { border-right: 1px solid #f0f0f4; }
.stat-label { font-size: 10px; color: #999; margin-bottom: 2px; }
.stat-val { font-size: 14px; font-weight: 600; }
.stat-val.used { color: #4478c4; }
.stat-val.avail { color: #22a07a; }
.zone-total { border-top: 1px solid #f0f0f4; padding: 7px 12px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
.zone-total span { font-size: 11px; color: #999; }
.zone-total strong { font-size: 12px; font-weight: 600; color: #555; }
.section-card { background: #fff; border-radius: 10px; border: 1px solid #e8e8f0; padding: 16px 18px; margin-bottom: 16px; }
.section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.legend-sq { width: 9px; height: 9px; border-radius: 2px; }
.bar-wrap { height: 200px; position: relative; }
.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filters label { font-size: 11px; color: #999; }
.filters select { font-size: 12px; padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer; }
.row-info { font-size: 11px; color: #aaa; margin-bottom: 8px; }
.tbl-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; border-radius: 6px; border: 1px solid #f0f0f4; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { text-align: left; padding: 9px 11px; font-size: 11px; font-weight: 600; color: #888; border-bottom: 1px solid #ebebf0; white-space: nowrap; position: sticky; top: 0; background: #fafafa; z-index: 1; }
tbody td { padding: 7px 11px; border-bottom: 1px solid #f5f5f8; white-space: nowrap; color: #333; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f9f9fc; }
.tbadge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
.t-RT { background: #e8f0fb; color: #1a5fa8; }
.t-RE { background: #e2f5ee; color: #0d6b53; }
.t-FR { background: #eeeeff; color: #3733a0; }
.plt-bar { display: flex; align-items: center; gap: 6px; }
.plt-mini { height: 6px; background: #b0c8e8; border-radius: 3px; min-width: 4px; }
</style>

function buildZoneCards(){var grid=document.getElementById('zoneGrid');zones.forEach(function(z,i){var pct=Math.round(z.used/z.capa*1000)/10;var avail=z.capa-z.used;var card=document.createElement('div');card.className='zone-card';card.innerHTML='<div class="zone-head"><div class="dot" style="background:'+z.color+'"></div><span class="zone-title">'+z.name+'</span></div><div class="zone-chart-area"><canvas id="donut'+i+'"></canvas></div><div class="zone-stats"><div class="stat"><div class="stat-label">사용 PLT</div><div class="stat-val used">'+z.used.toLocaleString()+'</div></div><div class="stat"><div class="stat-label">여유 PLT</div><div class="stat-val avail">'+avail.toLocaleString()+'</div></div></div><div class="zone-total"><span>총 CAPA</span><strong>'+z.capa.toLocaleString()+' PLT</strong></div>';grid.appendChild(card);(function(idx,p,c){setTimeout(function(){var ctx=document.getElementById('donut'+idx).getContext('2d');new Chart(ctx,{type:'doughnut',data:{datasets:[{data:[p,100-p],backgroundColor:[c,'#f0f0f6'],borderWidth:0,cutout:'72%'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:600}},plugins:[{id:'ct',afterDraw:function(ch){var cx=ch.ctx;var a=ch.chartArea;var mx=a.left+(a.right-a.left)/2;var my=a.top+(a.bottom-a.top)/2;cx.save();cx.textAlign='center';cx.textBaseline='middle';cx.font='bold 18px -apple-system,sans-serif';cx.fillStyle=c;cx.fillText(p.toFixed(1)+'%',mx,my-7);cx.font='10px -apple-system,sans-serif';cx.fillStyle='#aaa';cx.fillText('Fillrate',mx,my+10);cx.restore();}}]});},50);})(i,pct,z.color);});}

function buildTeamLegend(){var el=document.getElementById('teamLegend');mdTeams.forEach(function(t,i){el.innerHTML+='<div class="legend-item"><div class="legend-sq" style="background:'+teamColors[i]+'"></div>'+t+'</div>';});}

function buildMdBarChart(){var ctx=document.getElementById('mdBarChart').getContext('2d');var labels=['상온','냉장','냉동'];var zc=['RT','RE','FR'];var ds=mdTeams.map(function(n,i){return{label:n,data:zc.map(function(z){return teamByZone[z][i];}),backgroundColor:teamColors[i],borderRadius:2,borderSkipped:false};});new Chart(ctx,{type:'bar',data:{labels:labels,datasets:ds},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return' '+c.dataset.label+': '+c.parsed.x.toLocaleString()+' PLT';}}}},scales:{x:{stacked:true,grid:{color:'#f0f0f4'},ticks:{font:{size:11},color:'#aaa'}},y:{stacked:true,grid:{display:false},ticks:{font:{size:12},color:'#555'}}}}});}

function getMd(id){var info=mdMap[String(id)];if(!info)return{name:id?('ID:'+id):'-',team:'-'};return{name:info[0],team:info[1]};}

function initFilters(){var fTeam=document.getElementById('fTeam');var teams=[];rawData.forEach(function(r){var t=getMd(r[3]).team;if(teams.indexOf(t)<0)teams.push(t);});teams.sort().forEach(function(t){fTeam.innerHTML+='<option value="'+t+'">'+t+'</option>';});}

function onTeamChange(){var sel=document.getElementById('fTeam').value;var fMd=document.getElementById('fMd');fMd.innerHTML='<option value="">전체</option>';var names=[];rawData.forEach(function(r){var info=getMd(r[3]);if((!sel||info.team===sel)&&names.indexOf(info.name)<0&&info.name!=='-')names.push(info.name);});names.sort().forEach(function(n){fMd.innerHTML+='<option value="'+n+'">'+n+'</option>';});renderTable();}

function renderTable(){var fz=document.getElementById('fZone').value;var ft=document.getElementById('fTeam').value;var fm=document.getElementById('fMd').value;var filtered=rawData.filter(function(r){var info=getMd(r[3]);if(fz&&r[0]!==fz)return false;if(ft&&info.team!==ft)return false;if(fm&&info.name!==fm)return false;return true;});var zl={RT:'상온',RE:'냉장',FR:'냉동'};var bc={RT:'t-RT',RE:'t-RE',FR:'t-FR'};var mx=Math.max.apply(null,filtered.map(function(r){return r[5];}))||1;var html='';filtered.forEach(function(r){var info=getMd(r[3]);var pw=Math.max(4,Math.round(r[5]/mx*80));html+='<tr><td><span class="tbadge '+bc[r[0]]+'">'+zl[r[0]]+'</span></td><td style="color:#888;font-family:monospace">'+r[1]+'</td><td>'+r[2]+'</td><td style="text-align:right">'+r[4].toLocaleString()+'</td><td><div class="plt-bar"><div class="plt-mini" style="width:'+pw+'px"></div><span>'+r[5]+'</span></div></td><td style="color:#555">'+info.team+'</td><td style="font-weight:500">'+info.name+'</td></tr>';});document.getElementById('tblBody').innerHTML=html;document.getElementById('rowInfo').textContent=filtered.length+'건 표시'+(filtered.length<rawData.length?' (전체 '+rawData.length+'건 중)':"");}

buildZoneCards();buildTeamLegend();buildMdBarChart();initFilters();renderTable();
</script>
